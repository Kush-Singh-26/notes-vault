name: Deploy Notes Vault

on:
  push:
    branches: ["main"]
  repository_dispatch:
    types: [theme-updated]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Notes Vault
        uses: actions/checkout@v4
        with:
          path: notes-vault
          fetch-depth: 0

      - name: Resolve Kosh Version
        id: kosh
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ -n "${{ github.event.client_payload.version }}" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Kosh
        env:
          KOSH_VERSION: ${{ steps.kosh.outputs.version }}
        run: |
          if [ "$KOSH_VERSION" = "latest" ]; then
            url="https://github.com/Kush-Singh-26/kosh/releases/latest/download/kosh-linux-amd64"
          else
            url="https://github.com/Kush-Singh-26/kosh/releases/download/$KOSH_VERSION/kosh-linux-amd64"
          fi
          curl -fSL "$url" -o kosh
          chmod +x kosh
          sudo install -m 0755 kosh /usr/local/bin/kosh
          kosh version

      - name: Setup Parchment Theme
        run: |
          git clone https://github.com/Kush-Singh-26/kosh-theme-parchment kosh-theme-parchment

      - name: Restore File Timestamps
        uses: chetan/git-restore-mtime-action@v2
        with:
          working-directory: notes-vault

      - name: Restore Build Cache
        uses: actions/cache@v4
        with:
          path: notes-vault/.kosh-cache
          key: kosh-cache-notes-vault-${{ runner.os }}-${{ github.sha }}
          restore-keys: kosh-cache-notes-vault-${{ runner.os }}-

      - name: Build Site
        working-directory: notes-vault
        run: kosh build --baseurl https://kush-singh-26.github.io/notes-vault/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: notes-vault/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
